name: Nightly Dependency Audit

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  nightly-audit:
    name: "Nightly CVE Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Safety audit
        run: |
          pip install safety
          mkdir -p reports
          safety check \
            -r target-app/requirements.txt \
            --json \
            --continue-on-error \
            > reports/nightly-safety.json 2>&1 || true

      - name: Run pip-audit (second opinion)
        run: |
          pip install pip-audit
          pip-audit \
            -r target-app/requirements.txt \
            --format json \
            -o reports/pip-audit.json || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit
        working-directory: dashboard
        run: |
          npm ci --prefer-offline
          npm audit --json > ../reports/nightly-npm-audit.json 2>&1 || true

      - name: Summarise new critical CVEs
        id: summary
        run: |
          python - <<'EOF'
          import json, pathlib, sys

          new_criticals = []
          for p in pathlib.Path("reports").glob("nightly-*.json"):
              try:
                  data = json.loads(p.read_text())
              except Exception:
                  continue
              vulns = data.get("vulnerabilities", data) if isinstance(data, dict) else data
              for v in (vulns if isinstance(vulns, list) else []):
                  cvss = float(v.get("cvss", v.get("CVSSv3", 0)) or 0)
                  if cvss >= 9.0:
                      new_criticals.append(v)

          if new_criticals:
              print(f"::set-output name=critical_count::{len(new_criticals)}")
              print(f"Found {len(new_criticals)} critical CVE(s) in nightly audit")
              sys.exit(1)
          else:
              print("::set-output name=critical_count::0")
              print("No critical CVEs found in nightly audit")
          EOF

      - name: Open GitHub issue on critical findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['security', 'critical-cve'],
              state: 'open',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Critical CVE(s) detected in nightly audit - ${new Date().toISOString().split('T')[0]}`,
                body: `The nightly dependency audit has detected one or more critical CVEs.\n\n**Action required**: Review the [nightly audit workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) and update affected dependencies.\n\nThis issue was automatically opened by the DevSecOps pipeline.`,
                labels: ['security', 'critical-cve', 'automated'],
              });
            }

      - name: Upload nightly reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-audit-${{ github.run_id }}
          path: reports/
          retention-days: 30
