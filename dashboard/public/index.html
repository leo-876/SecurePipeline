<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecurePipeline - Posture Dashboard</title>

<style>
  :root {
    --bg:         #0a0c10;
    --bg2:        #0f1218;
    --bg3:        #141820;
    --border:     #1e2530;
    --border2:    #2a3340;
    --text:       #c8d4e0;
    --text-dim:   #5a6880;
    --text-bright:#eef2f8;
    --green:      #22c55e;
    --green-dim:  #16532e;
    --red:        #ef4444;
    --red-dim:    #5c1a1a;
    --orange:     #f97316;
    --yellow:     #eab308;
    --blue:       #3b82f6;
    --blue-dim:   #1e3a5f;
    --purple:     #a855f7;
    --critical:   #ef4444;
    --high:       #f97316;
    --medium:     #eab308;
    --low:        #3b82f6;
    --info:       #6b7280;
    --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'Menlo', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Layout */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-bright);
    letter-spacing: 0.05em;
  }

  .header-logo .icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #22c55e, #3b82f6);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .main {
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--border2); }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--text-bright);
    line-height: 1;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  .stat-card.accent-green { border-color: var(--green-dim); }
  .stat-card.accent-green .stat-value { color: var(--green); }
  .stat-card.accent-red { border-color: var(--red-dim); }
  .stat-card.accent-red .stat-value { color: var(--red); }

  /* Gate status banner */
  .gate-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-radius: 8px;
    margin-bottom: 24px;
    font-family: var(--font-mono);
    font-size: 12px;
    border: 1px solid;
  }

  .gate-banner.pass {
    background: rgba(34, 197, 94, 0.06);
    border-color: rgba(34, 197, 94, 0.3);
    color: var(--green);
  }

  .gate-banner.fail {
    background: rgba(239, 68, 68, 0.06);
    border-color: rgba(239, 68, 68, 0.3);
    color: var(--red);
  }

  .gate-icon { font-size: 16px; }

  /* Two-column layout */
  .row { display: grid; gap: 16px; margin-bottom: 16px; }
  .row-2 { grid-template-columns: 2fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }

  /* Panel */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  .panel-body { padding: 18px; }

  /* Chart */
  .chart-container {
    position: relative;
    height: 200px;
  }

  canvas { width: 100% !important; }

  /* Severity breakdown */
  .sev-bars { display: flex; flex-direction: column; gap: 10px; }

  .sev-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sev-label {
    font-family: var(--font-mono);
    font-size: 10px;
    width: 60px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .sev-bar-track {
    flex: 1;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }

  .sev-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  .sev-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    width: 28px;
    text-align: right;
  }

  /* Tool breakdown */
  .tool-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tool-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
  }

  .tool-chip .chip-count {
    background: var(--border2);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Gate history table */
  .history-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .history-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text-dim);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
    border-bottom: 1px solid var(--border);
  }

  .history-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: var(--bg3); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .badge-pass { background: rgba(34,197,94,0.12); color: var(--green); }
  .badge-fail { background: rgba(239,68,68,0.12); color: var(--red); }

  .score-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
  }

  /* Hotspots */
  .hotspot-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .hotspot-row:last-child { border-bottom: none; }

  .hotspot-file {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--blue);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .hotspot-badges { display: flex; gap: 4px; align-items: center; }

  .sev-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .hotspot-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    min-width: 28px;
    text-align: right;
  }

  /* Branch filter */
  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg2);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

  /* Loading / error states */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 120px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    gap: 8px;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 40px 20px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
    .row-2, .row-3 { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    .header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <div class="icon">🔒</div>
    SECUREPIPELINE / POSTURE DASHBOARD
  </div>
  <div class="header-meta">
    <span id="last-updated">-</span>
    <div class="live-dot" title="Auto-refreshes every 60s"></div>
    <span>LIVE</span>
  </div>
</header>

<main class="main">

  <!-- Gate status banner -->
  <div id="gate-banner" class="gate-banner pass" style="display:none">
    <span class="gate-icon"></span>
    <span id="gate-banner-text"></span>
  </div>

  <!-- Summary stats -->
  <div class="summary-grid" id="summary-grid">
    <div class="stat-card"><div class="stat-label">Risk Score</div><div class="stat-value" id="stat-risk">-</div><div class="stat-sub" id="stat-risk-sub">latest run</div></div>
    <div class="stat-card"><div class="stat-label">Pass Rate</div><div class="stat-value" id="stat-passrate">-</div><div class="stat-sub" id="stat-pass-sub">all time</div></div>
    <div class="stat-card"><div class="stat-label">Total Runs</div><div class="stat-value" id="stat-total">-</div><div class="stat-sub" id="stat-total-sub">pipeline executions</div></div>
    <div class="stat-card accent-green"><div class="stat-label">Passed</div><div class="stat-value" id="stat-passed">-</div><div class="stat-sub">gates cleared</div></div>
    <div class="stat-card accent-red"><div class="stat-label">Blocked</div><div class="stat-value" id="stat-failed">-</div><div class="stat-sub">deployments prevented</div></div>
  </div>

  <!-- Trend chart + severity/tool breakdown -->
  <div class="row row-2">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Risk Score Trend</span>
        <div class="filter-row" id="branch-filters" style="margin:0"></div>
      </div>
      <div class="panel-body">
        <div class="chart-container">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Finding Breakdown</span></div>
      <div class="panel-body">
        <div class="sev-bars" id="sev-bars">
          <div class="loading"><div class="spinner"></div> loading</div>
        </div>
        <div style="margin-top:20px">
          <div class="panel-title" style="margin-bottom:12px">By Tool</div>
          <div class="tool-chips" id="tool-chips"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Gate history + hotspots -->
  <div class="row row-2">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Gate History</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">last 20 runs</span></div>
      <div id="history-wrap">
        <div class="loading"><div class="spinner"></div> loading</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Hotspot Files</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">most findings</span></div>
      <div class="panel-body" id="hotspots-body">
        <div class="loading"><div class="spinner"></div> loading</div>
      </div>
    </div>
  </div>

</main>

<script src="chart.min.js"></script>
<script>
const API = '';  // Same origin - dashboard served by Express

// Mock data for demo mode (when backend not running)

function makeMockTrend() {
  const data = [];
  let score = 78;
  const now = Date.now();
  for (let i = 44; i >= 0; i--) {
    const jitter = (Math.random() * 16 - 8) | 0;
    if (i === 20) score = Math.min(100, score + 28);
    else score = Math.max(8, score - ((Math.random() * 2) | 0));
    score = Math.max(0, Math.min(100, score + jitter));
    data.push({
      commit_short: Math.random().toString(16).slice(2, 9),
      branch: i % 7 === 0 ? 'feature/auth' : 'main',
      risk_score: score,
      gate_passed: score < 70,
      scanned_at: new Date(now - i * 86400000).toISOString(),
    });
  }
  return data;
}

function makeMockSummary() {
  return { total_runs: 87, passed: 71, failed: 16, pass_rate: 82, avg_risk_score: 28,
    latest: { commit_short: 'a3f9c12', branch: 'main', risk_score: 14, gate_passed: true,
      scanned_at: new Date().toISOString() } };
}

function makeMockHotspots() {
  return [
    { file: 'target-app/src/app.py', count: 18, severities: ['high', 'medium'] },
    { file: 'target-app/src/db.py', count: 7, severities: ['medium', 'low'] },
    { file: 'target-app/Dockerfile', count: 5, severities: ['critical', 'high'] },
    { file: 'target-app/requirements.txt', count: 4, severities: ['high'] },
    { file: 'scanner/aggregate.py', count: 2, severities: ['low'] },
  ];
}

function makeMockReports() {
  const trend = makeMockTrend();
  return trend.slice(-20).reverse().map((t, i) => ({
    id: 80 - i, commit_sha: t.commit_short + '0000000', branch: t.branch,
    risk_score: t.risk_score, gate_passed: t.gate_passed, scanned_at: t.scanned_at,
    by_severity: { critical: t.risk_score > 60 ? 1 : 0, high: (t.risk_score / 20) | 0,
      medium: (t.risk_score / 5) | 0, low: 3, info: 0 },
    by_tool: { bandit: 3, semgrep: 4, safety: 2, trivy: 1 },
  }));
}

// Fetch helpers

let DEMO_MODE = false;

async function apiFetch(path) {
  if (DEMO_MODE) return null;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 2000);
    const r = await fetch(API + path, { signal: controller.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error(r.status);
    return r.json();
  } catch {
    DEMO_MODE = true;
    return null;
  }
}

// Colour helpers

const SEV_COLOR = {
  critical: '#ef4444', high: '#f97316', medium: '#eab308', low: '#3b82f6', info: '#6b7280'
};

function scoreColor(score) {
  if (score >= 70) return '#ef4444';
  if (score >= 40) return '#f97316';
  if (score >= 20) return '#eab308';
  return '#22c55e';
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function fmtRelative(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

// Summary cards

function renderSummary(s) {
  document.getElementById('stat-risk').textContent = s.latest?.risk_score ?? '-';
  document.getElementById('stat-risk').style.color = scoreColor(s.latest?.risk_score ?? 0);
  document.getElementById('stat-passrate').textContent = s.pass_rate + '%';
  document.getElementById('stat-passrate').style.color = s.pass_rate >= 80 ? 'var(--green)' : s.pass_rate >= 60 ? 'var(--yellow)' : 'var(--red)';
  document.getElementById('stat-total').textContent = s.total_runs;
  document.getElementById('stat-passed').textContent = s.passed;
  document.getElementById('stat-failed').textContent = s.failed;
  document.getElementById('stat-total-sub').textContent = `avg risk: ${s.avg_risk_score}/100`;

  if (s.latest) {
    const banner = document.getElementById('gate-banner');
    const text = document.getElementById('gate-banner-text');
    banner.style.display = 'flex';
    if (s.latest.gate_passed) {
      banner.className = 'gate-banner pass';
      document.querySelector('.gate-icon').textContent = '-';
      text.textContent = `Latest run PASSED - commit ${s.latest.commit_short} on ${s.latest.branch} · risk score ${s.latest.risk_score}/100 · ${fmtRelative(s.latest.scanned_at)}`;
    } else {
      banner.className = 'gate-banner fail';
      document.querySelector('.gate-icon').textContent = '-';
      text.textContent = `Latest run BLOCKED - commit ${s.latest.commit_short} on ${s.latest.branch} · risk score ${s.latest.risk_score}/100 · ${fmtRelative(s.latest.scanned_at)}`;
    }
    document.getElementById('last-updated').textContent = fmtRelative(s.latest.scanned_at);
  }
}

// Trend chart

let trendChart = null;
let allTrend = [];
let activeFilter = 'all';

function renderTrend(data) {
  allTrend = data;
  buildBranchFilters(data);
  drawChart(data);
}

function buildBranchFilters(data) {
  const branches = [...new Set(data.map(d => d.branch))];
  const container = document.getElementById('branch-filters');
  container.innerHTML = '';
  const allBtn = makeFilterBtn('all', 'All');
  container.appendChild(allBtn);
  branches.forEach(b => container.appendChild(makeFilterBtn(b, b)));
}

function makeFilterBtn(value, label) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (activeFilter === value ? ' active' : '');
  btn.textContent = label;
  btn.addEventListener('click', () => {
    activeFilter = value;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = value === 'all' ? allTrend : allTrend.filter(d => d.branch === value);
    drawChart(filtered);
  });
  return btn;
}

function drawChart(data) {
  const ctx = document.getElementById('trend-chart').getContext('2d');

  const threshold = Array(data.length).fill(70);

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.commit_short),
      datasets: [
        {
          label: 'Risk Score',
          data: data.map(d => d.risk_score),
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,0.07)',
          borderWidth: 2,
          pointBackgroundColor: data.map(d => d.gate_passed ? '#22c55e' : '#ef4444'),
          pointBorderColor: 'transparent',
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          tension: 0.3,
        },
        {
          label: 'Block Threshold',
          data: threshold,
          borderColor: 'rgba(239,68,68,0.35)',
          borderDash: [4, 4],
          borderWidth: 1,
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#141820',
          borderColor: '#1e2530',
          borderWidth: 1,
          titleColor: '#c8d4e0',
          bodyColor: '#5a6880',
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 10 },
          callbacks: {
            title: items => `commit ${items[0].label}`,
            label: item => item.datasetIndex === 0
              ? ` score: ${item.raw}  ${data[item.dataIndex]?.gate_passed ? '- pass' : '- block'}`
              : ` threshold: 70`,
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#5a6880', font: { family: 'JetBrains Mono', size: 9 }, maxRotation: 0, maxTicksLimit: 10 },
          grid: { color: '#1e2530' },
          border: { color: '#1e2530' }
        },
        y: {
          min: 0, max: 100,
          ticks: { color: '#5a6880', font: { family: 'JetBrains Mono', size: 9 }, stepSize: 20 },
          grid: { color: '#1e2530' },
          border: { color: '#1e2530' }
        }
      }
    }
  });
}

// Severity bars

function renderSeverityBars(reports) {
  const totals = { critical: 0, high: 0, medium: 0, low: 0, info: 0 };
  const toolTotals = {};
  for (const r of reports) {
    if (r.by_severity) for (const [k, v] of Object.entries(r.by_severity)) totals[k] = (totals[k] ?? 0) + v;
    if (r.by_tool) for (const [k, v] of Object.entries(r.by_tool)) toolTotals[k] = (toolTotals[k] ?? 0) + v;
  }

  const max = Math.max(...Object.values(totals), 1);
  const container = document.getElementById('sev-bars');
  container.innerHTML = '';
  for (const [sev, count] of Object.entries(totals)) {
    const pct = Math.round((count / max) * 100);
    container.innerHTML += `
      <div class="sev-row">
        <span class="sev-label">${sev}</span>
        <div class="sev-bar-track">
          <div class="sev-bar-fill" style="width:${pct}%;background:${SEV_COLOR[sev]}"></div>
        </div>
        <span class="sev-count">${count}</span>
      </div>`;
  }

  const chips = document.getElementById('tool-chips');
  chips.innerHTML = '';
  for (const [tool, count] of Object.entries(toolTotals).sort((a, b) => b[1] - a[1])) {
    chips.innerHTML += `<div class="tool-chip">${tool}<span class="chip-count">${count}</span></div>`;
  }
}

// Gate history table

function renderHistory(reports) {
  const wrap = document.getElementById('history-wrap');
  if (!reports.length) { wrap.innerHTML = '<div class="empty">No runs yet</div>'; return; }

  let rows = '';
  for (const r of reports.slice(0, 20)) {
    const sc = scoreColor(r.risk_score);
    const badge = r.gate_passed
      ? '<span class="badge badge-pass">- pass</span>'
      : '<span class="badge badge-fail">- block</span>';
    const sha = (r.commit_sha ?? '').slice(0, 7);
    rows += `
      <tr>
        <td style="color:var(--blue);font-family:var(--font-mono)">${sha}</td>
        <td>${r.branch}</td>
        <td><span class="score-pill" style="background:${sc}22;color:${sc}">${r.risk_score}</span></td>
        <td>${badge}</td>
        <td style="color:var(--text-dim)">${fmtRelative(r.scanned_at)}</td>
      </tr>`;
  }

  wrap.innerHTML = `
    <table class="history-table">
      <thead><tr><th>Commit</th><th>Branch</th><th>Score</th><th>Gate</th><th>When</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// Hotspots

function renderHotspots(hotspots) {
  const body = document.getElementById('hotspots-body');
  if (!hotspots.length) { body.innerHTML = '<div class="empty">No data yet</div>'; return; }

  body.innerHTML = hotspots.map(h => {
    const dots = h.severities.map(s => `<div class="sev-dot" style="background:${SEV_COLOR[s]??'#666'}" title="${s}"></div>`).join('');
    return `
      <div class="hotspot-row">
        <span class="hotspot-file" title="${h.file}">${h.file.replace('target-app/', '')}</span>
        <div class="hotspot-badges">${dots}</div>
        <span class="hotspot-count">${h.count}</span>
      </div>`;
  }).join('');
}

// Bootstrap

async function load() {
  let [summary, trend, reports, hotspots] = await Promise.all([
    apiFetch('/api/summary'),
    apiFetch('/api/trend?n=50'),
    apiFetch('/api/reports?limit=30'),
    apiFetch('/api/hotspots'),
  ]);

  if (DEMO_MODE) {
    summary = makeMockSummary();
    trend = makeMockTrend();
    reports = makeMockReports();
    hotspots = makeMockHotspots();
    // Show demo notice
    const banner = document.getElementById('gate-banner');
    banner.style.display = 'flex';
    banner.className = 'gate-banner pass';
    document.querySelector('.gate-icon').textContent = '🔵';
    document.getElementById('gate-banner-text').textContent = 'DEMO MODE - backend not detected; showing mock data. Run: cd dashboard && npm install && npm run seed && npm run dev';
  }

  renderSummary(summary);
  renderTrend(trend);
  renderSeverityBars(reports);
  renderHistory(reports);
  renderHotspots(hotspots);
}

load();

// Auto-refresh every 60s
setInterval(load, 60000);
</script>
</body>
